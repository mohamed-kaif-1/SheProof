<!DOCTYPE html>
<html>
<head>
  <title>SheProof</title>
  <style>
    body {
      width: 320px;
      background: #FFD600;
      font-family: 'Arial Black', sans-serif;
      padding: 20px;
    }

    .title {
      font-size: 20px;
      border: 4px solid black;
      padding: 12px;
      background: white;
      box-shadow: 6px 6px 0 black;
      margin-bottom: 20px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-bottom: 18px;
      background: white;
      border: 4px solid black;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 6px 6px 0 black;
      transition: 0.1s;
      font-size: 14px;
      text-transform: uppercase;
    }

    button:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0 black;
    }

    .hashBox {
      background: black;
      color: #00FF88;
      padding: 10px;
      font-family: monospace;
      font-size: 11px;
      word-break: break-all;
      border: 4px solid black;
      box-shadow: 6px 6px 0 black;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="title">SHEPROOF</div>

  <button id="screenshotBtn">TAKE SCREENSHOT</button>

  <div id="hashOutput" class="hashBox" style="display:none;"></div>
  <button id="openBtn">OPEN SHEPROOF</button>

  <script src="popup.js"></script>

</body>
</html>
